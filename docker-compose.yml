services:
  kafka:
    image: bitnami/kafka:4.0.0
    container_name: weather-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka

  producer:
    build: .
    container_name: weather-producer
    command: python producer.py
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka

  consumer:
    build: .
    container_name: weather-consumer
    command: python consumer_spark.py
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPARK_LOCAL_IP=127.0.0.1
    depends_on:
      - kafka
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    container_name: weather-dashboard
    command: streamlit run dashboard.py --server.address=0.0.0.0 --server.port=8501
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - consumer
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data

volumes:
  kafka_data:

